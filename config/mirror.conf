# Pi Mirror Daemon Configuration
# Location: /etc/pi-mirror/mirror.conf
#
# All values here survive package or repo updates.
# After editing, restart the service:
#   sudo systemctl restart pi-mirror-daemon
#
# To update at runtime without a restart (non-admin keys):
#   ssh mirror-admin update_config timeout=180

[mirror]

# BCM GPIO pin number for the PIR sensor signal wire
pir_pin = 22

# Seconds of no motion before the display is turned off
timeout = 120

# Full command + args for the kiosk browser (space-separated)
# browser_cmd = chromium-browser --noerrdialogs --disable-infobars --kiosk http://localhost

# Absolute path for the rotating log file
log_file = /var/log/pi-mirror-daemon.log

# Absolute path for the Unix-domain management socket
socket_path = /run/pi-mirror/pi-mirror-daemon.sock

# Comma-separated list of SSH usernames allowed to issue admin commands
# (reboot, shutdown, update_config).  Leave empty to disallow all admin ops.
admin_users = mirror-admin
